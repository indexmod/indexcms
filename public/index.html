<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>IndexCMS</title>

<style>
body {
  font-family: sans-serif;
  max-width: 900px;
  margin: 40px auto;
}

a {
  display: block;
  padding: 6px 0;
  color: blue;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

button {
  padding: 6px 10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>Pages</h1>
  <button onclick="location.href='/editor'">+ New</button>
</div>

<div id="list">Loading...</div>

<script>
async function load() {
  const res = await fetch("/api/pages");
  const pages = await res.json();

  const el = document.getElementById("list");
  el.innerHTML = "";

  pages.forEach(p => {
    const a = document.createElement("a");
    a.href = "/page/" + p.slug;
    a.textContent = p.title || p.slug;
    el.appendChild(a);
  });
}

load();
</script>

</body>
</html>
