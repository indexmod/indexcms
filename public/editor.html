<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Editor</title>
</head>
<body>

<button onclick="save()">Save</button>

<textarea id="md" style="width:100%;height:90vh;"></textarea>

<script>
let name = location.pathname.split('/').pop();

// NEW FILE → генерим имя
if (name === "__new__") {
  name = crypto.randomUUID() + ".md";
}

// ===== TEMPLATE =====
function template() {
  return `---
title: New page
permalink: new-page
---

Write your content here...
`;
}

// ===== LOAD =====
async function load() {
  const res = await fetch('/api/file/' + encodeURIComponent(name));
  const text = await res.text();

  document.getElementById('md').value = text || template();
}

// ===== SAVE =====
function save() {
  const md = document.getElementById('md').value;

  // вытаскиваем permalink
  const permalink = (md.match(/permalink:\s*(.*)/)?.[1] || "").trim();

  if (!permalink) {
    alert("permalink required");
    return;
  }

  fetch('/api/save', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      name,
      content: md
    })
  }).then(() => {
    // 👉 сразу открываем страницу
    location.href = '/' + encodeURIComponent(permalink);
  });
}

load();
</script>

</body>
</html>
