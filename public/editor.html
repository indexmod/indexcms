const EDITOR = `
<!doctype html>
<html>
<body>

<button onclick="save()">Save</button>

<textarea id="md" style="width:100%;height:90vh;"></textarea>

<script>
let name = location.pathname.split('/').pop();

// ===== NEW FILE =====
if (name === "__new__") {
  name = crypto.randomUUID() + ".md";
}

// ===== TEMPLATE =====
function template() {
  const id = crypto.randomUUID();

  return \`---
title: New page
permalink:
---

Write here...
\`;
}

// ===== LOAD =====
async function load() {
  if (location.pathname.includes("__new__")) {
    document.getElementById('md').value = template();
    return;
  }

  const res = await fetch('/api/file/' + encodeURIComponent(name));
  const text = await res.text();

  document.getElementById('md').value = text || template();
}

// ===== SAVE =====
function save() {
  const md = document.getElementById('md').value;

  // 👉 достаём permalink
  let permalink = (md.match(/permalink:\\s*(.*)/)?.[1] || "").trim();

  // 👉 если нет — генерим из title
  if (!permalink) {
    const title = (md.match(/title:\\s*(.*)/)?.[1] || "").trim();

    permalink = title
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/(^-|-$)/g, "");

    // вставляем обратно в markdown
    const updated = md.replace(
      /permalink:\\s*(.*)/,
      "permalink: " + permalink
    );

    document.getElementById('md').value = updated;
  }

  fetch('/api/save', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      name,
      content: document.getElementById('md').value
    })
  })
  .then(() => {
    location.href = '/' + permalink;
  });
}

load();
</script>

</body>
</html>
`;
