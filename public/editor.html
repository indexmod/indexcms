<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Editor</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<input id="title" placeholder="title">
<input id="slug" placeholder="slug">

<br><br>

<textarea id="md" style="width:100%;height:300px;"></textarea>

<br>

<button onclick="save()">Save</button>

<h3>Preview</h3>
<div id="preview"></div>

<script>
const md = document.getElementById("md");

md.addEventListener("input", () => {
  document.getElementById("preview").innerHTML =
    marked.parse(md.value);
});

function save() {
  const id = (md.value.match(/id:\s*(.*)/)?.[1] || '').trim();
  const title = (md.value.match(/title:\s*(.*)/)?.[1] || '').trim();

  const slugInput = (md.value.match(/slug:\s*(.*)/)?.[1] || '').trim();

  const slug =
    slugInput && slugInput !== "new-page"
      ? slugInput
      : title.toLowerCase().replace(/[^a-z0-9]+/g, "-");

  fetch('/api/save', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      id,
      title,
      slug,
      content: md.value
    })
  }).then(() => location.href = '/');
}
</script>

</body>
</html>
