const PAGE = `
<!doctype html>
<html>
<body>

<a href="/">back</a>
<button id="edit">edit</button>

<h1 id="title"></h1>
<pre id="content"></pre>

<script>
const slug = location.pathname.split('/').pop();

fetch('/api/page/' + slug)
.then(r => r.json())
.then(d => {

  document.getElementById('title').textContent = d.title;

  const fm =
"---\\n" +
"id: " + (d.id || "") + "\\n" +
"title: " + (d.title || "") + "\\n" +
"slug: " + (d.slug || "") + "\\n" +
"---\\n\\n" +
(d.content || "");

  document.getElementById('content').textContent = fm;

  document.getElementById('edit').onclick = () => {
    location.href = '/editor?slug=' + slug;
  };
});
</script>

</body>
</html>
`;
