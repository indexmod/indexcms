const PAGE = `
<!doctype html>
<html>
<body>

<a href="/">back</a>
<button id="edit">edit</button>

<h1 id="title"></h1>
<pre id="content"></pre>

<script>
  async function savePage(req, env) {
    const data = await req.json();

    const title = data.title || "untitled";

    // auto slug ALWAYS safe
    const slug =
      data.slug && data.slug.trim() !== ""
        ? data.slug
        : title
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/(^-|-$)/g, "");

    const id = data.id || crypto.randomUUID();

    const md = `---
  id: ${id}
  title: ${title}
  slug: ${slug}
  ---

  ${data.content || ""}
  `;

    await env.PAGES.put(`${slug}.md`, md);

    return json({ ok: true, slug });
  }
</script>

</body>
</html>
`;
