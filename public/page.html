<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Page</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<a href="/">← back</a>
<a id="edit">edit</a>

<h1 id="title"></h1>
<div id="content"></div>

<script>
const slug = location.pathname.split("/").pop();

fetch("/api/page/" + slug)
.then(r => r.json())
.then(data => {
  document.getElementById("title").textContent = data.title;
  document.getElementById("content").innerHTML = marked.parse(data.content || "");

  document.getElementById("edit").href = "/editor";
});
</script>

</body>
</html>
