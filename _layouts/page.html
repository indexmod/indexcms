---
layout: default
---

<div id="page">Loading...</div>

<script type="module">
import { getPage } from "/assets/api.js";

const slug = new URLSearchParams(location.search).get("slug");

const page = await getPage(slug);

document.getElementById("page").innerHTML = `
  <h1>${page.title}</h1>
  <pre>${page.content}</pre>
`;
</script>
