<h1>Index</h1>

<div id="list">Loading...</div>

<script type="module">
import { listPages } from "/assets/api.js";

const pages = await listPages();

document.getElementById("list").innerHTML =
  pages.map(p =>
    `<div><a href="/page.html?slug=${p.slug}">${p.title}</a></div>`
  ).join("");
</script>
